<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- background -->
  <rect width="400" height="400" fill="#0d0914"/>

  <!-- border: 4 sides, 24px wide -->
  <rect x="0" y="0" width="400" height="24" fill="#a855f7"/>
  <rect x="0" y="376" width="400" height="24" fill="#a855f7"/>
  <rect x="0" y="0" width="24" height="400" fill="#a855f7"/>
  <rect x="376" y="0" width="24" height="400" fill="#a855f7"/>

  <!-- pixel-art notch cutouts: 2 per side, at 1/3 and 2/3 positions -->
  <rect x="108" y="0"   width="24" height="24" fill="#0d0914"/>
  <rect x="268" y="0"   width="24" height="24" fill="#0d0914"/>
  <rect x="108" y="376" width="24" height="24" fill="#0d0914"/>
  <rect x="268" y="376" width="24" height="24" fill="#0d0914"/>
  <rect x="0"   y="108" width="24" height="24" fill="#0d0914"/>
  <rect x="0"   y="268" width="24" height="24" fill="#0d0914"/>
  <rect x="376" y="108" width="24" height="24" fill="#0d0914"/>
  <rect x="376" y="268" width="24" height="24" fill="#0d0914"/>

  <!-- </> monogram -->
  <text x="200" y="252"
        font-family="'Courier New', Courier, monospace"
        font-size="116"
        font-weight="900"
        fill="#a855f7"
        text-anchor="middle">&lt;/&gt;</text>
</svg>
